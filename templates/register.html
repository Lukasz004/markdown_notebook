{% extends 'base.html' %}

{% block head %}

{% endblock %}

{% block body %}
<div class="main-container">
    <div class="login-container">
        <h1>Rejestracja</h1>
        {% with messages = get_flashed_messages(with_categories=true)%}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message message-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/register" method="POST" class="login-form">
            <input type="text" class="login-input" id="mail" name="mail" placeholder="mail">
            <input type="text" class="login-input" id="login" name="login" placeholder="login">
            <input type="password" class="login-input" id="password" name="password" placeholder="hasło">
            <input type="password" class="login-input" id="retype-password" name="retype-password" placeholder="powtórz hasło">
            <button type="submit">Zarejestruj</button>
        </form>
    </div>
</div>
{% endblock %}
